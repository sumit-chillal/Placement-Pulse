    <head>

        />

            content="Track college placement drives with real-time alerts."
        />

        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="Placements" />
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <link

            rel="stylesheet"
        />
        <title>PlacementPulse | Real-Time Placement Alerts</title>
        <script>
            window.addEventListener(
                "error",
                function (e) {
                    if (
                        e.error instanceof DOMException &&
                        e.error.name === "DataCloneError" &&
                        e.message &&
                        e.message.includes("PerformanceServerTiming")
                    ) {
                        e.stopImmediatePropagation();
                        e.preventDefault();
                    }
                },
                true
            );
        </script>
